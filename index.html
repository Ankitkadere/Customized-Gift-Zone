  <script>
    let deferredPrompt; // store the event

    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const statusText = document.getElementById("status-text");
    const installStatus = document.getElementById("installStatus");
    const audio = document.getElementById("audioPlayer");
    const installBtn = document.getElementById("installsystem");
    const appDownload = document.getElementById("appDownload");

    // Wait for browser to fire install event
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // show the install button (if hidden)
      installBtn.classList.remove("hidden");
    });

    // Show modal immediately
    installBtn.addEventListener("click", async () => {
      appDownload.classList.remove("hidden");

      // Start fake progress bar
      let duration = 5000; // total ms
      let startTime = null;

      function animateProgress(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const percent = Math.floor(progress * 100);

        progressBar.style.width = percent + "%";
        progressText.textContent = percent + "%";

        if (progress < 1) {
          requestAnimationFrame(animateProgress);
        } else {
          statusText.textContent = "Download Complete!";
          installStatus.textContent = "Ready to Install";
          audio.play().catch(err => console.error(err));

          // Show PWA install prompt
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
              if (choice.outcome === "accepted") {
                installStatus.textContent = "App Installed!";
              } else {
                installStatus.textContent = "Install Cancelled";
              }
              deferredPrompt = null;
              setTimeout(() => {
                window.location.reload();
              }, 3000);
            });
          } else {
            installStatus.textContent = "Already Installed";
            setTimeout(() => {
              window.location.reload();
            }, 3000);
          }
        }
      }
      requestAnimationFrame(animateProgress);
    });
  </script>

  <script>
    (function () {
      const wrapper = document.getElementById("bannerWrapper");
      const slides = wrapper.children;
      let index = 0;

      function showSlide(i) {
        index = (i + slides.length) % slides.length;
        wrapper.style.transform = `translateX(-${index * 100}%)`;
      }

      document.getElementById("prevBanner").addEventListener("click", () => showSlide(index - 1));
      document.getElementById("nextBanner").addEventListener("click", () => showSlide(index + 1));

      // Auto-slide every 3 seconds
      setInterval(() => showSlide(index + 1), 3000);
    })();
  </script>

  <script>
    // Load CSS dynamically
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "css/style.css";

    // Load HTML and then run filter.js
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("Courselist.html");
        const html = await res.text();

        // Create a temporary container
        const temp = document.createElement("div");
        temp.innerHTML = html;

        // ✅ Extract and run inline <script> tags inside Courselist.html
        temp.querySelectorAll("script").forEach(oldScript => {
          const newScript = document.createElement("script");
          if (oldScript.src) {
            newScript.src = oldScript.src; // external script inside Courselist.html
          } else {
            newScript.textContent = oldScript.textContent; // inline script
          }
          document.body.appendChild(newScript);
          oldScript.remove();
        });

        // ✅ Insert remaining HTML
        document.getElementById("courselist").innerHTML = temp.innerHTML;

        // ✅ Remove old filter.js if already loaded
        const oldScript = document.getElementById("courselist-script");
        if (oldScript) oldScript.remove();

        // ✅ Finally, load filter.js
        const script = document.createElement("script");
        script.src = "filter.js";
        script.id = "courselist-script";
        script.type = "text/javascript";
        document.body.appendChild(script);

      } catch (err) {
        console.error("Error loading courselist:", err);
      }
    });

  <script>
    const courses = [
      "English Speaking",
      "Telly",
      "DCA",
      "PGDCA",
      "11th",
      "12th"
    ];

    const input = document.getElementById("search");
    const suggestionsList = document.getElementById("suggestions-list");

    function filterSuggestions() {
      const value = input.value.toLowerCase();
      suggestionsList.innerHTML = "";
      if (!value) {
        suggestionsList.classList.add("hidden");
        input.setAttribute("aria-expanded", "false");
        return;
      }
      const filtered = courses.filter(course => course.toLowerCase().startsWith(value));
      if (filtered.length === 0) {
        suggestionsList.classList.add("hidden");
        input.setAttribute("aria-expanded", "false");
        return;
      }
      filtered.forEach((course, index) => {
        const li = document.createElement("li");
        li.setAttribute("role", "option");
        li.id = `suggestion-${index}`;
        li.className = "px-3 py-1 cursor-pointer hover:bg-[#e6f4f1]";
        li.textContent = course;
        li.addEventListener("click", () => {
          input.value = course;
          suggestionsList.classList.add("hidden");
          input.setAttribute("aria-expanded", "false");
          input.focus();
        });
        suggestionsList.appendChild(li);
      });
      suggestionsList.classList.remove("hidden");
      input.setAttribute("aria-expanded", "true");
    }

    function handleKeyDown(e) {
      const active = document.activeElement;
      const options = Array.from(suggestionsList.querySelectorAll("li"));
      if (suggestionsList.classList.contains("hidden")) return;

      let currentIndex = options.findIndex(option => option === active);

      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (currentIndex < options.length - 1) {
          options[currentIndex + 1].focus();
          input.setAttribute("aria-activedescendant", options[currentIndex + 1].id);
        } else if (currentIndex === -1 && options.length > 0) {
          options[0].focus();
          input.setAttribute("aria-activedescendant", options[0].id);
        }
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (currentIndex > 0) {
          options[currentIndex - 1].focus();
          input.setAttribute("aria-activedescendant", options[currentIndex - 1].id);
        }
      } else if (e.key === "Enter") {
        if (currentIndex >= 0) {
          e.preventDefault();
          input.value = options[currentIndex].textContent;
          suggestionsList.classList.add("hidden");
          input.setAttribute("aria-expanded", "false");
          input.setAttribute("aria-activedescendant", "");
          input.focus();
        }
      } else if (e.key === "Escape") {
        suggestionsList.classList.add("hidden");
        input.setAttribute("aria-expanded", "false");
        input.setAttribute("aria-activedescendant", "");
      }
    }

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#search") && !e.target.closest("#suggestions-list")) {
        suggestionsList.classList.add("hidden");
        input.setAttribute("aria-expanded", "false");
        input.setAttribute("aria-activedescendant", "");
      }
    });
  </script>
