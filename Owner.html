<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>
    Login : Gift Zone
    <meta name="theme-color" content="#f5fdf7">
      <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>

<body class="fixed w-full h-full bg-[#f0f0f0]  flex items-center justify-center  ">

  <!-- Background circles -->
  <img alt="Large light gray circle background top left"
    class="hidden sm:block absolute top-0 left-0 w-[120px] h-[120px] rounded-full" height="120"
    src="https://storage.googleapis.com/a1aa/image/4ec421ae-3827-4267-6b10-1bb5496f5434.jpg"
    style="transform: translate(-50%, -50%)" width="120" />
  <img alt="Large red circle background behind left card"
    class="hidden sm:block absolute top-1/3 left-1/4 w-[120px] h-[120px] rounded-full" height="120"
    src="https://storage.googleapis.com/a1aa/image/ca07d62f-2e8b-4362-147c-bda87b5e8a78.jpg"
    style="transform: translate(-50%, -50%)" width="120" />
  <img alt="Large red circle background behind right card bottom right"
    class="hidden sm:block absolute bottom-0 right-0 w-[300px] h-[300px] rounded-full" height="120"
    src="https://storage.googleapis.com/a1aa/image/64ed5666-f8ea-437b-80ae-87746832fd81.jpg"
    style="transform: translate(50%, 50%)" width="120" />
  <img alt="Medium light red circle background top right"
    class="hidden sm:block absolute top-0 right-0 w-[120px] h-[120px] rounded-full" height="120"
    src="https://storage.googleapis.com/a1aa/image/a9bcb80f-51bc-45dd-ada9-12c9ae529a5b.jpg"
    style="transform: translate(50%, -50%)" width="120" />
  <img alt="Medium light gray circle background bottom center"
    class="hidden sm:block absolute bottom-1/3 left-1/2 w-[120px] h-[120px] rounded-full" height="120"
    src="https://storage.googleapis.com/a1aa/image/9eaaaf2a-b3dc-4aa4-9363-953a40c6778d.jpg"
    style="transform: translate(-50%, 50%)" width="20" />
  <!-- Left Card: Sign In Form -->
  <section id="data1" style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)"
    class=" z-50 md:w-96 w-full h-full  overflow-hidden shadow-lg flex flex-col">
    <div class="px-6 pt-6 pb-16 text-white" style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)">
      <div class="flex items-center mb-6 justify-between">
        <button onclick="history.back()" aria-label="Go back"
          class="w-10 h-10 bg-white rounded-full flex justify-center items-center shadow-sm">
          <i class="fas fa-chevron-down text-gray-700 text-lg">
          </i>
        </button>
        <button onclick="window.location.href='index.html'" aria-label="Go back"
          class="text-3xl  flex justify-center items-center shadow-sm">
          <h1 class=" shadow-lg out text-3xl mx-auto font-extrabold leading-snug">
            Gift Zone
          </h1>
        </button>
      </div>
      <h1 class="mt-8 text-3xl mx-auto font-semibold leading-snug">
        Get Inside
        <br />
        Sign in !
      </h1>
    </div>
    <div class="md:hidden z-[222] fixed bottom-0 bg-[#f7f7f9] w-full h-10"></div>
    <form autocomplete="off"
      class="border-4 mt-4   bg-[#f7f7f9] px-6 pt-16 pb-10 h-full rounded-t-3xl flex flex-col gap-6">
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Mobile Number
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="tel" value="+91 123 456 7890 " />
          <i aria-hidden="true" class="fas fa-check absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
          </i>
        </div>
      </label>
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Password
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="password" value="•••••••" />
          <i aria-hidden="true"
            class="fas fa-eye-slash absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-lg cursor-pointer">
          </i>
        </div>
      </label>
      <div class="text-right text-xs text-gray-700 font-normal cursor-pointer">
        Forgot password?
      </div>
      <button class="mt-20  w-full py-3 rounded-full font-semibold text-white text-sm"
        style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)" type="submit">
        SIGN IN
      </button>
      <p class="mt-6 text-xs text-gray-600 text-right font-normal">
        Don’t have account?
        <span onclick="swapin()" class="font-extrabold text-lg text-gray-900">
          Sign up
        </span>
      </p>
    </form>
  </section>

  <!-- Right Card: Create Account -->
  <section id="data2" style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)"
    class="z-50 md:block hidden md:w-96 w-full h-full   overflow-hidden shadow-lg flex flex-col">
    <div class="px-6 pt-6 pb-16 text-white" style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)">
      <div class="flex items-center mb-6 justify-between">
        <button onclick="history.back()" aria-label="Go back"
          class="w-10 h-10 bg-white rounded-full flex justify-center items-center shadow-sm">
          <i class="fas fa-chevron-down text-gray-700 text-lg">
          </i>
        </button>
        <button onclick="window.location.href='index.html'" aria-label="Go back"
          class="text-3xl  flex justify-center items-center shadow-sm">
          <h1 class=" shadow-lg out text-3xl mx-auto font-extrabold leading-snug">
            Gift Zone
          </h1>
        </button>
      </div>

      <h1 class="mt-8 text-3xl mx-auto font-semibold leading-snug">
        Wellcome
        <br />
        Sign Up !
      </h1>
    </div>
    <div class="md:hidden z-[222] fixed bottom-0 bg-[#f7f7f9] w-full h-14"></div>
    <form autocomplete="off" class="  bottom-0 w-full bg-[#f7f7f9] px-6 pt-8 pb-10 rounded-t-3xl flex flex-col gap-6">
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Full Name
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="text" value="Mr. Ankit Kadere" />
          <i aria-hidden="true" class="fas fa-check absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
          </i>
        </div>
      </label>
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Mobile Number
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="tel" value="+91 123 456 7890" />
          <i aria-hidden="true" class="fas fa-check absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
          </i>
        </div>
      </label>
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Password
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="password" value="•••••••" />
          <i aria-hidden="true"
            class="fas fa-eye-slash absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-sm cursor-pointer">
          </i>
        </div>
      </label>
      <label class="flex flex-col text-sm font-semibold text-[#b90f2a]">
        Confirm Password
        <div class="relative">
          <input
            class="mt-1 w-full border-b border-gray-400 bg-transparent py-1 pr-8 text-gray-500 text-lg focus:outline-none"
            type="password" value="•••••••" />
          <i aria-hidden="true"
            class="fas fa-eye-slash absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 text-sm cursor-pointer">
          </i>
        </div>
      </label>
      <button class="mt-6 w-full py-3 rounded-full font-semibold text-white text-sm"
        style="background: linear-gradient(90deg, #b90f2a 0%, #2e143a 100%)" type="submit">
        SIGN UP
      </button>
      <p class="mt-2 text-xs text-gray-600 text-right font-normal">
        Don’t have account?
        <span onclick="swapup()" class="font-extrabold text-lg text-gray-900">
          Sign In
        </span>
      </p>
    </form>
  </section>

</body>
<script>
  function swapin() {
    document.getElementById("data1").classList.add("hidden");
    document.getElementById("data2").classList.remove("hidden");
  }
  function swapup() {
    document.getElementById("data1").classList.remove("hidden");
    document.getElementById("data2").classList.add("hidden");
  }
</script>

</html>
