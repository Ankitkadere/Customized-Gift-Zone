<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gift Zone — Login & Signup</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome (replace with your kit) -->
  <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap');
  </style>
</head>

<body style="background: linear-gradient(90deg, #b90f2a 0%, #000000 100%)"
  class="flex items-center justify-center min-h-screen">

  <!-- Header -->
  <div class="px-6 pt-6 md:py-1 pb-1 top-0 rounded-b-[40px] text-white fixed w-full z-50">
    <div class="flex items-center mb-6 justify-between">
      <button onclick="history.back()" aria-label="Go back"
        class="w-10 h-10 bg-white rounded-full flex justify-center items-center shadow-sm">
        <i class="fas fa-chevron-down text-gray-700 text-lg"></i>
      </button>
      <button onclick="window.location.href='index.html'" aria-label="Go home"
        class="text-3xl flex justify-center items-center shadow-sm">
        <h1 class="shadow-lg text-3xl mx-auto font-extrabold leading-snug">Gift Zone</h1>
      </button>
    </div>
  </div>

  <!-- Main Container for Forms -->
  <div class="bg-white p-6 absolute bottom-0 md:relative shadow-lg w-full max-w-md">
    <div id="formContainer">

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5" novalidate>
        <h2 class="text-2xl font-semibold text-center">Login Your Account</h2>
        <div>
          <label for="email" class="block mb-1 font-medium text-gray-700">Email</label>
          <input type="email" id="email" name="loginEmail" required placeholder="you@example.com"
            class="w-full px-4 py-2 border rounded-md focus:outline-none" />
          <p class="mt-1 text-sm text-red-500 hidden" id="loginEmailError">Please enter a valid email.</p>
        </div>
        <div>
          <label for="password" class="block mb-1 font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="loginPassword" required placeholder="Your password"
            class="w-full px-4 py-2 border rounded-md focus:outline-none" minlength="6" />
          <p class="mt-1 text-sm text-red-500 hidden" id="loginPasswordError">Password must be at least 6 characters.
          </p>
        </div>
        <div id="signInMessage" class="text-center text-sm text-red-500 my-2 hidden"></div>
        <button style="background: linear-gradient(90deg, #b90f2a 0%, #000000 100%)" type="submit" id="submitSignIn"
          class="w-full text-white py-2 rounded-md font-extrabold hover:opacity-90 transition">
          Login
        </button>
        <p class="mt-4 text-center text-gray-600">
          Don't have an account?
          <button type="button" id="showSignup" class="text-indigo-600 hover:underline font-semibold">Sign up</button>
        </p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="space-y-5 hidden" novalidate>
        <h2 class="text-2xl font-semibold mb-6 text-center">Create Your Account</h2>
        <div>
          <label for="fName" class="block mb-1 font-medium text-gray-700">Full Name</label>
          <input type="text" id="fName" name="signupName" required placeholder="John Doe"
            class="w-full px-4 py-2 border rounded-md focus:outline-none" />
          <p class="mt-1 text-sm text-red-500 hidden" id="signupNameError">Please enter your name.</p>
        </div>
        <div>
          <label for="rEmail" class="block mb-1 font-medium text-gray-700">Email</label>
          <input type="email" id="rEmail" name="signupEmail" required placeholder="you@example.com"
            class="w-full px-4 py-2 border rounded-md focus:outline-none" />
          <p class="mt-1 text-sm text-red-500 hidden" id="signupEmailError">Please enter a valid email.</p>
        </div>
        <div>
          <label for="rPassword" class="block mb-1 font-medium text-gray-700">Password</label>
          <input type="password" id="rPassword" name="signupPassword" required placeholder="Choose a password"
            class="w-full px-4 py-2 border rounded-md focus:outline-none" minlength="6" />
          <p class="mt-1 text-sm text-red-500 hidden" id="signupPasswordError">Password must be at least 6 characters.
          </p>
        </div>
        <div class="">
          <label for="signupConfirmPassword" class="block mb-1 font-medium text-gray-700">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" required
            placeholder="Confirm your password" class="w-full px-4 py-2 border rounded-md focus:outline-none"
            minlength="6" />
          <p class="mt-1 text-sm text-red-500 hidden" id="signupConfirmPasswordError">Passwords do not match.</p>
        </div>
        <div id="signUpMessage" class="text-center text-sm text-red-500 my-2 hidden"></div>
        <button style="background: linear-gradient(90deg, #b90f2a 0%, #000000 100%)" type="submit" id="submitSignUp"
          class="w-full text-white py-2 rounded-md font-extrabold hover:opacity-90 transition">
          Sign Up
        </button>
        <p class="mt-4 text-center text-gray-600">
          Already have an account?
          <button type="button" id="showLogin" class="text-indigo-600 hover:underline font-semibold">Login</button>
        </p>
      </form>

    </div>
  </div>


  <!-- Firebase + App Logic -->
  <script type="module">
    // Import Firebase modular SDK v12.x
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    // Your Firebase configuration (replace with your own)
    const firebaseConfig = {
      apiKey: "AIzaSyAKN5GR18VTFrKNgVG7FenD4aSTX3Q2PbA",
      authDomain: "gift-zone-project.firebaseapp.com",
      projectId: "gift-zone-project",
      storageBucket: "gift-zone-project.appspot.com",
      messagingSenderId: "806465456032",
      appId: "1:806465456032:web:becf8988a6dfabe43646c5",
      measurementId: "G-1ZLMWBP61Y"
    };

    // Initialize app, auth, firestore
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Utility: Show messages
    function showMessage(message, divId) {
      const div = document.getElementById(divId);
      if (!div) return;
      div.textContent = message;
      div.classList.remove("hidden");
      div.style.opacity = "1";
      // Fade out after some seconds
      setTimeout(() => {
        div.style.opacity = "0";
        setTimeout(() => {
          div.classList.add("hidden");
        }, 500);
      }, 4000);
    }

    // Email validation
    function isValidEmail(email) {
      return /^\S+@\S+\.\S+$/.test(email);
    }

    // Elements
    const loginForm = document.getElementById("loginForm");
    const loginEmailInput = document.getElementById("email");
    const loginPasswordInput = document.getElementById("password");
    const loginEmailError = document.getElementById("loginEmailError");
    const loginPasswordError = document.getElementById("loginPasswordError");
    const signInMessageDiv = document.getElementById("signInMessage");

    const signupForm = document.getElementById("signupForm");
    const signupNameInput = document.getElementById("fName");
    const signupEmailInput = document.getElementById("rEmail");
    const signupPasswordInput = document.getElementById("rPassword");
    const signupConfirmPasswordInput = document.getElementById("signupConfirmPassword");
    const signupNameError = document.getElementById("signupNameError");
    const signupEmailError = document.getElementById("signupEmailError");
    const signupPasswordError = document.getElementById("signupPasswordError");
    const signupConfirmPasswordError = document.getElementById("signupConfirmPasswordError");
    const signUpMessageDiv = document.getElementById("signUpMessage");

    const showSignupBtn = document.getElementById("showSignup");
    const showLoginBtn = document.getElementById("showLogin");

    // Toggle between forms
    showSignupBtn.addEventListener("click", () => {
      loginForm.classList.add("hidden");
      signupForm.classList.remove("hidden");
      // clear messages/errors
      signInMessageDiv.classList.add("hidden");
      loginEmailError.classList.add("hidden");
      loginPasswordError.classList.add("hidden");
      loginForm.reset();
    });
    showLoginBtn.addEventListener("click", () => {
      signupForm.classList.add("hidden");
      loginForm.classList.remove("hidden");
      signUpMessageDiv.classList.add("hidden");
      signupNameError.classList.add("hidden");
      signupEmailError.classList.add("hidden");
      signupPasswordError.classList.add("hidden");
      signupConfirmPasswordError.classList.add("hidden");
      signupForm.reset();
    });

    // Signup handler
    signupForm.addEventListener("submit", (e) => {
      e.preventDefault();
      let valid = true;
      const name = signupNameInput.value.trim();
      const email = signupEmailInput.value.trim();
      const password = signupPasswordInput.value;
      const confirmPassword = signupConfirmPasswordInput.value;

      if (name === "") {
        signupNameError.classList.remove("hidden");
        valid = false;
      } else {
        signupNameError.classList.add("hidden");
      }

      if (!isValidEmail(email)) {
        signupEmailError.classList.remove("hidden");
        valid = false;
      } else {
        signupEmailError.classList.add("hidden");
      }

      if (password.length < 6) {
        signupPasswordError.classList.remove("hidden");
        valid = false;
      } else {
        signupPasswordError.classList.add("hidden");
      }

      if (password !== confirmPassword) {
        signupConfirmPasswordError.classList.remove("hidden");
        valid = false;
      } else {
        signupConfirmPasswordError.classList.add("hidden");
      }

      if (!valid) return;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          // Save user in Firestore
          return setDoc(doc(db, "users", user.uid), {
            firstName: name,
            email: email,
            createdAt: new Date().toISOString()
          });
        })
        .then(() => {
          document.getElementById("submitSignUp").value = "Please Wait..."
          showMessage("Account created successfully !", "signUpMessage");
          document.getElementById("submitSignUp").value = "Account Created Successfully  ";
          signupForm.reset();
          // Switch to login form
          signupForm.classList.add("hidden");
          loginForm.classList.remove("hidden");
        })
        .catch((error) => {
          console.error("Error during signup:", error);
          if (error.code === "auth/email-already-in-use") {
            showMessage("Email already in use.", "signUpMessage");
          } else {
            showMessage("Signup error: " + error.message, "signUpMessage");
          }
        });
    });

    // Login handler
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      let valid = true;
      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value;

      if (!isValidEmail(email)) {
        loginEmailError.classList.remove("hidden");
        valid = false;
      } else {
        loginEmailError.classList.add("hidden");
      }

      if (password.length < 6) {
        loginPasswordError.classList.remove("hidden");
        valid = false;
      } else {
        loginPasswordError.classList.add("hidden");
      }

      if (!valid) return;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          loginForm.value = "Please Wait..."
          const user = userCredential.user;
          localStorage.setItem("loggedInUserId", user.uid);
          showMessage("Login successful!", "signInMessage");
          // Redirect or load next page
          window.location.href = "Orderlist.html";
        })
        .catch((error) => {
          console.error("Error during login:", error);
          if (error.code === "auth/wrong-password") {
            showMessage("Wrong password.", "signInMessage");
          } else if (error.code === "auth/user-not-found") {
            showMessage("User not found. Please signup.", "signInMessage");
          } else {
            showMessage("Login error: " + error.message, "signInMessage");
          }
        });
    });

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in; you can use user.uid, user.email etc.
        // For example, if on a protected page, show user data
        console.log("User is logged in:", user.uid);
      } else {
        console.log("No user is signed in.");
      }
    });

  </script>

</body>

</html>
